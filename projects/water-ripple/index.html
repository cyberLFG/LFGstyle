<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>水波纹 · LFG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="shader-error"></div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="text" id="load-text">初始化引擎...</div>
  </div>

  <div id="mode-btns">
    <button class="mode-btn active" data-mode="LIQUID">LIQUID</button>
    <button class="mode-btn" data-mode="CRYSTAL">CRYSTAL</button>
  </div>

  <button id="btn-camera" title="切换摄像头">🔄</button>
  <a id="btn-back" href="../../index.html" title="返回主页">←</a>
  <div id="hint">手指靠近摄像头划过水面</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
