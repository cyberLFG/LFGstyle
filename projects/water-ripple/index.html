<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水波纹交互 · LFG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'PingFang SC','Microsoft YaHei',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent;}
canvas{display:block;position:fixed;inset:0;z-index:0;}
video{display:none;}

#shader-error{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);color:#ff4444;font-family:'Consolas','SF Mono',monospace;font-size:13px;padding:30px;overflow-y:auto;white-space:pre-wrap;display:none;line-height:1.5;}

#loading{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);transition:opacity .5s;}
#loading.hidden{opacity:0;pointer-events:none;}
#loading .spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.1);border-top-color:#64b4ff;border-radius:50%;animation:spin .8s linear infinite;}
#loading .text{color:rgba(255,255,255,.6);font-size:13px;margin-top:14px;letter-spacing:1px;}
@keyframes spin{to{transform:rotate(360deg);}}

#mode-btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;}
.mode-btn{padding:10px 28px;border-radius:24px;border:1px solid rgba(255,255,255,.15);background:rgba(10,10,20,.65);color:rgba(255,255,255,.55);font-size:13px;font-weight:600;letter-spacing:2px;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .3s;outline:none;}
.mode-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.mode-btn.active{color:#64b4ff;border-color:rgba(100,180,255,.5);background:rgba(100,180,255,.1);box-shadow:0 0 20px rgba(100,180,255,.15);}

#btn-camera{position:fixed;top:20px;right:20px;z-index:10;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(10,10,20,.6);color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .3s;outline:none;display:flex;align-items:center;justify-content:center;}
#btn-camera:hover{color:#fff;border-color:rgba(255,255,255,.3);}

#btn-back{position:fixed;top:20px;left:20px;z-index:10;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(10,10,20,.55);color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .3s;outline:none;display:flex;align-items:center;justify-content:center;text-decoration:none;}
#btn-back:hover{color:#fff;border-color:rgba(255,255,255,.3);}

#hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:12px;z-index:5;pointer-events:none;text-align:center;transition:opacity .5s;}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<div id="shader-error"></div>

<div id="loading"><div class="spinner"></div><div class="text">正在初始化...</div></div>

<div id="mode-btns">
  <button class="mode-btn active" data-mode="LIQUID">LIQUID</button>
  <button class="mode-btn" data-mode="CRYSTAL">CRYSTAL</button>
</div>

<button id="btn-camera" title="切换摄像头">🔄</button>
<a id="btn-back" href="../../index.html" title="返回主页">←</a>
<div id="hint">将手指靠近摄像头，划过水面</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js">
</script>

<script>
(function(){
'use strict';

// ======================== DOM ========================
const video = document.getElementById('cam');
const canvas = document.getElementById('c');
const errDiv = document.getElementById('shader-error');
const loading = document.getElementById('loading');
const hint = document.getElementById('hint');
const btnCam = document.getElementById('btn-camera');
const gl = canvas.getContext('webgl',{antialias:false,alpha:false,preserveDrawingBuffer:false});

if(!gl){showError('WebGL 不可用，请使用支持 WebGL 的浏览器');return;}

// ======================== 模式配置 ========================
const MODES = {
  LIQUID: {speed:0.99,atten:0.0035,refract:0.035,disp:0.003,fresnel:0.25,depth:0.6,specS:0.35,specB:0.25,drop:0.45},
  CRYSTAL:{speed:0.97,atten:0.008,refract:0.018,disp:0.01,fresnel:0.6,depth:0.25,specS:0.9,specB:0.4,drop:0.3}
};
let mode = 'LIQUID';
let modeParams = MODES[mode];

// ======================== 渲染分辨率 ========================
let W=0,H=0,aspectRatio=1;
let texW=0,texH=0; // 纹理分辨率

// ======================== WebGL 工具 ========================
function createShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    const info=gl.getShaderInfoLog(s);
    gl.deleteShader(s);
    throw new Error(info);
  }
  return s;
}

function createProgram(vSrc,fSrc){
  const vs=createShader(gl.VERTEX_SHADER,vSrc);
  const fs=createShader(gl.FRAGMENT_SHADER,fSrc);
  const p=gl.createProgram();
  gl.attachShader(p,vs);
  gl.attachShader(p,fs);
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){
    const info=gl.getProgramInfoLog(p);
    gl.deleteProgram(p);
    throw new Error(info);
  }
  return p;
}

function createFBO(w,h){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

  const type = gl.getExtension('OES_texture_float') ? gl.FLOAT : gl.UNSIGNED_BYTE;
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,type,null);

  const fb=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {fb,tex,w,h};
}

function createQuad(){
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  return buf;
}

function showError(msg){
  errDiv.textContent = 'SHADER ERROR:\n\n' + msg;
  errDiv.style.display = 'block';
  loading.classList.add('hidden');
  console.error(msg);
}

// ======================== 着色器 ========================

const vertShader = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  gl_Position=vec4(a_pos,0.,1.);
  v_uv=a_pos*.5+.5;
}`;

// 模拟着色器 — 9-tap 各向同性波动方程
const simFrag = `
precision highp float;
varying vec2 v_uv;

uniform sampler2D u_curr;
uniform sampler2D u_prev;
uniform vec2 u_texSize;
uniform float u_speed;       // c^2
uniform float u_atten;       // 基础衰减
uniform float u_dropStrength;
uniform float u_aspect;      // 宽高比校正

// 手指数据: 每个 vec4 = (curX,curY, prevX,prevY)
uniform vec4 u_fingers[10];
uniform float u_fingerCount; // float: 活跃手指数量

float capsuleSDF(vec2 p,vec2 a,vec2 b,float r){
  vec2 pa=p-a, ba=b-a;
  float h=clamp(dot(pa,ba)/max(dot(ba,ba),1e-6),0.,1.);
  return length(pa-ba*h)-r;
}

void main(){
  vec2 step=1./u_texSize;
  float dx=step.x, dy=step.y;

  float hC=texture2D(u_curr,v_uv).r;
  float hL=texture2D(u_curr,v_uv+vec2(-dx,0.)).r;
  float hR=texture2D(u_curr,v_uv+vec2(dx,0.)).r;
  float hD=texture2D(u_curr,v_uv+vec2(0.,-dy)).r;
  float hU=texture2D(u_curr,v_uv+vec2(0.,dy)).r;
  float hLD=texture2D(u_curr,v_uv+vec2(-dx,-dy)).r;
  float hRD=texture2D(u_curr,v_uv+vec2(dx,-dy)).r;
  float hLU=texture2D(u_curr,v_uv+vec2(-dx,dy)).r;
  float hRU=texture2D(u_curr,v_uv+vec2(dx,dy)).r;

  // 9-tap 各向同性 Laplacian: 轴向权重 0.2, 对角权重 0.05
  float laplacian = 0.2*(hL+hR+hD+hU) + 0.05*(hLD+hRD+hLU+hRU) - hC;

  float prevH=texture2D(u_prev,v_uv).r;
  float newH=2.*hC - prevH + u_speed*laplacian;

  // 非线性衰减: 小振幅衰减快（表面张力），大振幅衰减慢（惯性）
  float absH=abs(newH);
  float damping = u_atten*(1.+4./(1.+absH*25.));
  newH *= 1.-damping;

  // 手指交互: capsule SDF + 宽高比校正
  float drop=0.;
  float count=0.;
  for(float i=0.;i<10.;i++){
    float active = step(i, u_fingerCount-0.5); // branch-free: i < fingerCount
    // 只在有活跃手指时计算
    vec4 fd=u_fingers[int(i)];
    // 宽高比校正坐标
    vec2 pCorr = v_uv*vec2(u_aspect,1.);
    vec2 aCorr = fd.xy*vec2(u_aspect,1.);
    vec2 bCorr = fd.zw*vec2(u_aspect,1.);
    float d=capsuleSDF(pCorr,aCorr,bCorr,.025);
    float add = u_dropStrength * (1.-smoothstep(-.02,0.,d)) * active;
    drop += add;
    count += active;
  }
  // 只在有手指时添加
  newH += drop * step(0.5, count);

  gl_FragColor=vec4(newH,0.,0.,1.);
}`;

// 渲染着色器 — 折射、透镜、色散、Fresnel、波深、双瓣高光
const renderFrag = `
precision highp float;
varying vec2 v_uv;

uniform sampler2D u_height;
uniform sampler2D u_video;
uniform vec2 u_texSize;
uniform float u_refract;   // 折射强度
uniform float u_disp;      // 色散强度
uniform float u_fresnelAmt; // Fresnel 系数
uniform float u_depthAmt;  // 波深效果强度
uniform float u_specS;     // 锐利高光
uniform float u_specB;     // 柔和高光

void main(){
  vec2 step=1./u_texSize;
  float h=texture2D(u_height,v_uv).r;
  float hL=texture2D(u_height,v_uv+vec2(-step.x,0.)).r;
  float hR=texture2D(u_height,v_uv+vec2(step.x,0.)).r;
  float hD=texture2D(u_height,v_uv+vec2(0.,-step.y)).r;
  float hU=texture2D(u_height,v_uv+vec2(0.,step.y)).r;

  // 梯度 — 直接用坡度驱动偏移（不归一化）
  vec2 grad=vec2(hR-hL,hU-hD)*.5;

  // Laplacian 曲率 — 透镜效应
  float lap=(hL+hR+hD+hU-4.*h);
  float lens=lap*80.;

  // 折射偏移
  vec2 offset=grad*u_refract;

  // 色散: RGB 三通道偏移略有差异
  float disp=u_disp;
  vec2 offR=offset*(1.+disp)*(1.+lens);
  vec2 offG=offset*(1.+lens);
  vec2 offB=offset*(1.-disp)*(1.+lens);

  float r=texture2D(u_video,v_uv+offR).r;
  float g=texture2D(u_video,v_uv+offG).g;
  float b=texture2D(u_video,v_uv+offB).b;
  vec3 base=vec3(r,g,b);

  // 法线: n = normalize(-grad.x, -grad.y, 1) (高度场)
  vec3 N=normalize(vec3(-grad.x*30.,-grad.y*30.,1.));

  // Fresnel (Schlick)
  float NdotV=abs(N.z);
  float fresnel=u_fresnelAmt+(1.-u_fresnelAmt)*pow(1.-NdotV,5.);

  // 波深明暗: 波峰暖亮，波谷冷暗
  float waveH=h*u_depthAmt*15.;
  vec3 warm=base+vec3(.12,.04,-.08)*waveH;
  vec3 cool=base+vec3(-.08,.0,.12)*(-waveH);
  // branch-free: 用 step 混合
  float isPeak=step(0.,waveH);
  vec3 depthCol=mix(cool,warm,isPeak);

  // 双瓣高光
  vec3 L=normalize(vec3(.3,.5,.8));
  vec3 V=vec3(0.,0.,1.);
  vec3 H=normalize(L+V);
  float NdotH=max(dot(N,H),0.);
  float specSharp=u_specS*pow(NdotH,180.);
  float specBroad=u_specB*pow(NdotH,18.);
  vec3 spec=(specSharp+specBroad)*vec3(1.,.95,.85);

  // Fresnel 反射: 在掠射角添加环境反射（模拟天空反射）
  vec3 reflectionColor=vec3(.3,.5,.8);
  vec3 fresnelRefl=reflectionColor*fresnel*.15;

  // 合成
  vec3 color=mix(depthCol,spec+fresnelRefl,fresnel);
  // Fresnel 高的区域 spec 更明显
  color+=spec*fresnel*.5;

  gl_FragColor=vec4(color,1.);
}`;

// ======================== 编译着色器 ========================
let simProgram, renderProgram, quadBuf;
try{
  simProgram=createProgram(vertShader,simFrag);
  renderProgram=createProgram(vertShader,renderFrag);
  quadBuf=createQuad();
}catch(e){
  showError(e.message);
  return;
}

// ======================== FBO / 纹理 ========================
let fboA,fboB,fboC;     // 三缓冲: curr, prev, output
let videoTex;

function resizeFBOs(){
  texW=Math.floor(W/2);
  texH=Math.floor(H/2);
  aspectRatio = W/Math.max(H,1);

  fboA=createFBO(texW,texH);
  fboB=createFBO(texW,texH);
  fboC=createFBO(texW,texH);

  videoTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,videoTex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
}

function resize(){
  const dpr=Math.min(window.devicePixelRatio,2);
  W=Math.floor(window.innerWidth*dpr);
  H=Math.floor(window.innerHeight*dpr);
  canvas.width=W;
  canvas.height=H;
  resizeFBOs();
  gl.viewport(0,0,W,H);
}

window.addEventListener('resize',resize);
resize();

// ======================== 手指数据 ========================
const MAX_FINGERS=10;
let fingerCurr = new Float32Array(MAX_FINGERS*2);
let fingerPrev = new Float32Array(MAX_FINGERS*2);
let fingerActive = 0;
let isFrontCamera = true;

// ======================== 模拟步进 ========================
function simStep(){
  gl.useProgram(simProgram);
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboC.fb);
  gl.viewport(0,0,texW,texH);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboA.tex);
  gl.uniform1i(gl.getUniformLocation(simProgram,'u_curr'),0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,fboB.tex);
  gl.uniform1i(gl.getUniformLocation(simProgram,'u_prev'),1);

  gl.uniform2f(gl.getUniformLocation(simProgram,'u_texSize'),texW,texH);
  gl.uniform1f(gl.getUniformLocation(simProgram,'u_speed'),modeParams.speed);
  gl.uniform1f(gl.getUniformLocation(simProgram,'u_atten'),modeParams.atten);
  gl.uniform1f(gl.getUniformLocation(simProgram,'u_dropStrength'),modeParams.drop);
  gl.uniform1f(gl.getUniformLocation(simProgram,'u_aspect'),aspectRatio);
  gl.uniform1f(gl.getUniformLocation(simProgram,'u_fingerCount'),fingerActive);

  // 打包手指数据到 10 个 vec4: (cx,cy, px,py)
  const fingers=new Float32Array(MAX_FINGERS*4);
  for(let i=0;i<fingerActive;i++){
    const j=i*4;
    fingers[j]=fingerCurr[i*2];
    fingers[j+1]=fingerCurr[i*2+1];
    fingers[j+2]=fingerPrev[i*2];
    fingers[j+3]=fingerPrev[i*2+1];
  }
  gl.uniform4fv(gl.getUniformLocation(simProgram,'u_fingers'),fingers);

  // 绘制全屏四边形
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  const aPos=gl.getAttribLocation(simProgram,'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // 三缓冲轮转: fboC→fboA(curr), fboA→fboB(prev)
  const tmp=fboB; fboB=fboA; fboA=fboC; fboC=tmp;
}

// ======================== 渲染步进 ========================
function renderStep(){
  // 上传视频帧到纹理（仅当视频就绪）
  if(video.readyState>=video.HAVE_CURRENT_DATA){
    gl.bindTexture(gl.TEXTURE_2D,videoTex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video);
  }

  gl.useProgram(renderProgram);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboA.tex);
  gl.uniform1i(gl.getUniformLocation(renderProgram,'u_height'),0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,videoTex);
  gl.uniform1i(gl.getUniformLocation(renderProgram,'u_video'),1);

  gl.uniform2f(gl.getUniformLocation(renderProgram,'u_texSize'),texW,texH);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_refract'),modeParams.refract);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_disp'),modeParams.disp);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_fresnelAmt'),modeParams.fresnel);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_depthAmt'),modeParams.depth);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_specS'),modeParams.specS);
  gl.uniform1f(gl.getUniformLocation(renderProgram,'u_specB'),modeParams.specB);

  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  const aPos=gl.getAttribLocation(renderProgram,'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ======================== MediaPipe 手部检测 ========================
let hands,cameraInstance;

function mediapipeToUV(x,y){
  // 前摄像头自动镜像: x = 1 - x
  const mx = isFrontCamera ? (1.-x) : x;
  return {x:mx, y:y}; // y 从上到下 (MediaPipe 默认)
}

function initHands(){
  loading.querySelector('.text').textContent='加载手部识别模型...';

  hands=new window.Hands({locateFile:(f)=>
    'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/'+f});

  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:.5,
    minTrackingConfidence:.4
  });

  hands.onResults(function(results){
    if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){
      // 收集所有指尖 (每手 5 个: landmarks 4,8,12,16,20)
      const tips=[];
      for(let h=0;h<results.multiHandLandmarks.length;h++){
        const lm=results.multiHandLandmarks[h];
        for(const idx of [4,8,12,16,20]){
          const uv=mediapipeToUV(lm[idx].x,lm[idx].y);
          tips.push(uv);
        }
      }

      // 保存前一帧位置
      fingerPrev.set(fingerCurr);
      // 更新当前帧位置
      fingerActive=Math.min(tips.length,MAX_FINGERS);
      for(let i=0;i<fingerActive;i++){
        fingerCurr[i*2]=tips[i].x;
        fingerCurr[i*2+1]=tips[i].y;
      }
      // 填充剩余
      for(let i=fingerActive;i<MAX_FINGERS;i++){
        fingerCurr[i*2]=fingerCurr[i*2+1]=0;
        fingerPrev[i*2]=fingerPrev[i*2+1]=0;
      }

      hint.style.opacity='0';
    }else{
      fingerActive=0;
      hint.style.opacity='1';
    }
  });

  startCamera();
}

function startCamera(){
  if(cameraInstance){
    cameraInstance.stop().then(()=>doStart());
  }else{
    doStart();
  }
}

function doStart(){
  cameraInstance=new window.Camera(video,{
    onFrame:async()=>{if(hands)await hands.send({image:video});},
    width:640,height:480
  });

  const opts=isFrontCamera?{facingMode:'user'}:{facingMode:'environment'};
  cameraInstance.start(opts).then(()=>{
    loading.classList.add('hidden');
    hint.textContent='将手指靠近摄像头，划过水面';
  }).catch(e=>{
    loading.querySelector('.text').textContent='摄像头访问失败';
    console.error(e);
  });
}

// ======================== UI 事件 ========================
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    mode=this.dataset.mode;
    modeParams=MODES[mode];
  });
});

btnCam.addEventListener('click',function(){
  isFrontCamera=!isFrontCamera;
  startCamera();
});

// ======================== 主循环 ========================
function loop(){
  requestAnimationFrame(loop);

  if(video.readyState>=video.HAVE_CURRENT_DATA){
    simStep();
    renderStep();
  }
}

// ======================== 启动 ========================
resize();
initHands();
requestAnimationFrame(loop);

})();
